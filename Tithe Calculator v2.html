<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 88%; }
        #output { margin-top: 20px; text-align: left; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; display: none; }
        .green { color: #28a745; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tithe Calculator</h2>
    <input type="number" id="dollars" placeholder="Enter amount ($)">
    <br>
    <label><input type="checkbox" id="thirdCheck"> Include 3rd Tithe?</label>
    <br><br>
    <button onclick="calculate()">Calculate Now</button>

    <div id="output">
        <div id="t1"></div>
        <div id="t2"></div>
        <div id="t3"></div>
        <div id="total" class="green"></div>
    </div>
</div>

<script>
function calculate() {
    let amt = parseFloat(document.getElementById('dollars').value);
    if (isNaN(amt) || amt <= 0) {
        alert("Please enter a valid amount");
        return;
    }

    let tithe1 = amt * 0.10;
    let remain = amt - tithe1;
    
    let tithe2 = remain * 0.10;
    remain -= tithe2;

    document.getElementById('t1').innerHTML = "<b>First Tithe:</b> $" + tithe1.toFixed(2);
    document.getElementById('t2').innerHTML = "<b>Second Tithe:</b> $" + tithe2.toFixed(2);

    if (document.getElementById('thirdCheck').checked) {
        let tithe3 = remain * 0.10;
        remain -= tithe3;
        document.getElementById('t3').innerHTML = "<b>Third Tithe:</b> $" + tithe3.toFixed(2);
        document.getElementById('t3').style.display = "block";
    } else {
        document.getElementById('t3').style.display = "none";
    }

    document.getElementById('total').innerHTML = "<br>Remaining: $" + remain.toFixed(2);
    document.getElementById('output').style.display = "block";
}
</script>

</body>
</html>
